name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
          pip install build

      - name: Run Ruff
        run: |
          ruff check .

      - name: Run Mypy
        run: |
          mypy --explicit-package-bases src/bbc_aos/

      - name: Run Pytest
        run: |
          pytest > pytest_output.txt 2>&1 || {
            echo "### Pytest Failure Log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat pytest_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          }

      - name: Build Package
        run: |
          python -m build

      - name: Build Docker Image
        run: |
          docker build -t bbc-aos:latest .
